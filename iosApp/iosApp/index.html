<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
    <title>Convene</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f5f5f5; }

        .header {
          background: #1a73e8;
          color: white;
          padding: 20px 16px;
          font-size: 22px;
          font-weight: bold;
        }

        .event-card {
            background: white;
            margin: 10px;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .event-title   { font-size: 16px; font-weight: bold; color: #1a1a1a; }
        .event-meta    { font-size: 13px; color: #666; margin-top: 4px; }
        .fav-btn       { position: absolute; top: 16px; right: 16px; font-size: 22px; cursor: pointer; background: none; border: none; }
        .fav-btn.active {
            color: #f5a623;
        }
        .add-btn {
          position: fixed; bottom: 24px; right: 24px;
          background: #1a73e8; color: white; border: none;
          border-radius: 50%; width: 56px; height: 56px;
          font-size: 28px; cursor: pointer;
          box-shadow: 0 4px 12px rgba(26,115,232,0.4);
        }

        .banner {
          display: none; padding: 12px 16px;
          font-size: 13px; text-align: center;
        }
        .banner.error   { background: #fff3e0; color: #e65100; }
        .banner.success { background: #e8f5e9; color: #2e7d32; }

        #modal {
          display: none; position: fixed; inset: 0;
          background: rgba(0,0,0,0.5);
          align-items: center; justify-content: center;
        }
        #modal.open { display: flex; }

        .modal-box {
          background: white; border-radius: 16px;
          padding: 24px; width: 90%; max-width: 400px;
        }
        .modal-box h3  { margin-bottom: 16px; }
        .modal-box input {
          width: 100%; padding: 10px; margin-bottom: 12px;
          border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        .modal-btn {
          width: 100%; padding: 12px; background: #1a73e8;
          color: white; border: none; border-radius: 8px;
          font-size: 16px; cursor: pointer; margin-bottom: 8px;
        }
        .cancel-btn {
          width: 100%; padding: 10px; border: none;
          background: none; color: #666; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">📅 Convene</div>
<div class="banner" id="banner"></div>
<div id="eventsList"></div>
<button class="add-btn" onclick="openModal()">+</button>

<div id="modal">
    <div class="modal-box">
        <h3>Add Session</h3>
        <input id="inp_title"   placeholder="Session title" />
        <input id="inp_speaker" placeholder="Speaker name" />
        <input id="inp_room"    placeholder="Room" />
        <button class="modal-btn" onclick="submitEvent()">
            🔐 Save (Biometric required)
        </button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    let pendingEvent = null;

    // Detect platform
    const isIOS = !!(window.webkit && window.webkit.messageHandlers);

    function callNative(method, data) {
        if (isIOS) {
            window.webkit.messageHandlers[method].postMessage(data || '');
        } else {
            if (data !== undefined) Android[method](data);
            else Android[method]();
        }
    }

    // ── Native → Web ──────────────────────────
    function onEventsLoaded(json) {
        const events = JSON.parse(json);
        const list = document.getElementById('eventsList');
        list.innerHTML = events.length === 0
            ? '<p style="padding:20px;color:#999;text-align:center">No sessions yet. Tap + to add.</p>'
            : events.map(e => `
                <div class="event-card">
                    <button class="fav-btn ${e.isFavorite ? 'active' : ''}" onclick="toggleFav('${e.id}')">
                        ${e.isFavorite ? '★' : '☆'}
                    </button>
                    <div class="event-title">${e.title}</div>
                    <div class="event-meta">👤 ${e.speaker} &nbsp;|&nbsp; 📍 ${e.room}</div>
                </div>`).join('');
    }

    function onAuthResult(success) {
        if (success && pendingEvent) {
            callNative('saveEvent', JSON.stringify(pendingEvent));
            pendingEvent = null;
            closeModal();
            showBanner('Session saved successfully!', 'success');
            callNative('loadEvents');
        } else {
            showBanner('Authentication failed. Please try again.', 'error');
        }
    }

    function onAppResumed() {
        callNative('loadEvents');
    }

    // ── Web → Native ──────────────────────────
    function openModal() {
        document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('open');
    }

    function submitEvent() {
        const title   = document.getElementById('inp_title').value.trim();
        const speaker = document.getElementById('inp_speaker').value.trim();
        const room    = document.getElementById('inp_room').value.trim();

        if (!title || !speaker || !room) {
            showBanner('Please fill all fields.', 'error');
            return;
        }

        pendingEvent = {
            id: Date.now().toString(),
            title, speaker, room,
            timeMs: Date.now(),
            isFavorite: false
        };
        callNative('requestBiometric');
    }

    function toggleFav(id) {
        callNative('toggleFavorite', id);
        callNative('loadEvents');
    }

    function showBanner(msg, type) {
        const b = document.getElementById('banner');
        b.textContent = msg;
        b.className = `banner ${type}`;
        b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 3000);
    }

    // Initial load
    window.onload = () => callNative('loadEvents');
</script>
</body>
</html>
